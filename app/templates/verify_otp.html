{% extends 'base.html' %}
{% block title %}Verify OTP{% endblock %}
{% block content %}
<div style="max-width:480px;margin:40px auto;padding:20px;border:1px solid #eee;border-radius:8px;">
  <h2>Enter OTP</h2>
  <form method="post">
    {% csrf_token %}
    <label for="mobile">Mobile</label><br>
    <input type="text" name="mobile" id="mobile" value="{{ mobile }}" style="width:100%;padding:8px;margin:8px 0;" required />
    <label for="otp">OTP</label><br>
    <input type="text" name="otp" id="otp" placeholder="6-digit code" style="width:100%;padding:8px;margin:8px 0;" required />
    {% if debug_otp %}
      <p style="color:#b71c1c;font-weight:700">DEBUG OTP: {{ debug_otp }}</p>
    {% endif %}
    <button type="submit" style="padding:10px 14px;background:var(--primary);color:#fff;border:none;border-radius:4px;">Verify & Sign In</button>
  </form>
  <p style="margin-top:12px;font-size:0.9rem;color:#666;">If you didn't receive the OTP, request a new one.</p>
</div>
{% endblock %}
