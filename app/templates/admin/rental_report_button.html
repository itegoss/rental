
{% extends "admin/change_list.html" %}

{% block object-tools %}
    {{ block.super }}

    <div style="margin: 10px 0; display:flex; gap:10px; align-items:center;">

        <form method="get" action="{% url 'admin:export_rental_excel' %}" style="display:flex; gap:10px; align-items:center;">
            
            <label><strong>Month:</strong></label>
            <select name="month">
                <option value="1">Jan</option>
                <option value="2">Feb</option>
                <option value="3">Mar</option>
                <option value="4">Apr</option>
                <option value="5">May</option>
                <option value="6">Jun</option>
                <option value="7">Jul</option>
                <option value="8">Aug</option>
                <option value="9">Sep</option>
                <option value="10">Oct</option>
                <option value="11">Nov</option>
                <option value="12">Dec</option>
            </select>

            <label><strong>Year:</strong></label>
            <input type="number" name="year" value="2026" style="width:90px;">

            <button type="submit" class="button" style="background: var(--header-bg); color:white;width: 27%;">
                Download Report
            </button>

        </form>

    </div>

{% endblock %}
