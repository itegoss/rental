{% extends "admin/change_list.html" %}
{% load admin_urls static admin_list %}
{% block content %}
<div class="module">
    <h2>Generate Rental Report</h2>
    <form method="post" action="">
        {% csrf_token %}
        <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 20px;">
            <label for="start_date" style="white-space: nowrap;">Start Date:</label>
            <input type="date" id="start_date" name="start_date" required>
            
            <label for="end_date" style="white-space: nowrap;">End Date:</label>
            <input type="date" id="end_date" name="end_date" required>
            
            <button type="submit" name="generate_report" class="button" style="background: #417690; color: white; padding: 5px 10px; border: none; border-radius: 4px;">
                Download PDF Report
            </button>
        </div>
    </form>
</div>

{{ block.super }}
{% endblock %}
