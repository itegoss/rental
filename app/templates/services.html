{% extends 'base.html' %}
{% load static %}
{% block title %}Our Services — Sick Bed Services{% endblock %}
{% block content %}
<style>
.services-page { max-width:1200px; margin:0 auto; padding:48px 20px; }
.services-head { text-align:center; margin-bottom:48px; }
.services-head h1 { font-size:2.2rem; font-weight:800; color:var(--text); margin-bottom:8px; }
.services-head h1 span { color:var(--primary); }
.services-head p { color:var(--muted); font-size:0.97rem; }
.underline-bar { width:64px; height:5px; background:linear-gradient(90deg,var(--primary),#ff6b6b); border-radius:4px; margin:12px auto 0; }
.services-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:26px; }
.service-card { background:#fff; border-radius:18px; box-shadow:0 6px 24px rgba(0,0,0,0.06); overflow:hidden; transition:transform 0.3s,box-shadow 0.3s; display:flex; flex-direction:column; }
.service-card:hover { transform:translateY(-8px); box-shadow:0 20px 50px rgba(236,36,39,0.12); }
.service-thumb { height:180px; overflow:hidden; }
.service-thumb img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.5s; }
.service-card:hover .service-thumb img { transform:scale(1.07); }
.service-body { padding:20px; flex:1; display:flex; flex-direction:column; }
.service-body h3 { font-size:1.1rem; font-weight:700; margin-bottom:8px; }
.service-body p { font-size:0.88rem; color:var(--muted); line-height:1.6; flex:1; margin-bottom:18px; }
.btn-contact { display:inline-flex; align-items:center; gap:6px; padding:9px 20px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; border:none; border-radius:999px; font-size:0.84rem; font-weight:700; font-family:var(--font); cursor:pointer; transition:transform 0.2s,box-shadow 0.2s; box-shadow:0 3px 10px rgba(236,36,39,0.22); }
.btn-contact:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(236,36,39,0.3); }
.btn-contact.revealed { background:#f3f4f6; color:var(--text); box-shadow:none; cursor:text; }
.no-services { text-align:center; padding:60px 20px; color:var(--muted); }
</style>

<div class="services-page">
  <div class="services-head">
    <h1>Comming <span>Soon</span></h1>
</div>

<script>
function showNumber(number, btn) {
  btn.innerHTML = '<i class="fas fa-phone" style="color:var(--success);"></i> ' + number;
  btn.classList.add('revealed');
}
</script>
{% endblock %}
